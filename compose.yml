services:
  mysql:
    image: mariadb:11.5.2
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:5.2.1
    ports:
      - 3306:80
    environment:
      PMA_HOST: mysql
    depends_on:
      - mysql

  snack-game:
    build: .
    ports:
      - 8000:80
    depends_on:
      - mysql