services:
  mariadb:
    image: mariadb:11.5.2
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:5.2.1
    ports:
      - 8080:80
    environment:
      PMA_HOST: mariadb
    depends_on:
      - mariadb

  snack-game:
    build: .
    ports:
      - 8000:80
    depends_on:
      - mariadb
